<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* 🌈 ANIMATED BACKGROUND */
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#4f46e5,#6366f1,#06b6d4,#7c3aed);
    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* CARD */
.login-card {
    width:360px;
    padding:40px;
    border-radius:16px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    box-shadow:0 25px 50px rgba(0,0,0,0.25);
    text-align:center;
    color:white;
}

/* TITLE */
.logo {
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
}

/* INPUT */
.input-group {
    margin-bottom:20px;
    text-align:left;
}

.input-group label {
    font-size:13px;
    opacity:0.85;
}

.input-group input {
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:14px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#facc15,#f97316);
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ERROR */
.error {
    color:#ffe4e6;
    margin-top:10px;
    font-size:13px;
}

/* FOOTER */
.footer {
    margin-top:20px;
    font-size:12px;
    opacity:0.7;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo">🎓 Student Portal</div>

    <div class="input-group">
        <label>Register Number</label>
        <input type="text" id="regno" placeholder="Enter your ID">
    </div>

    <button onclick="login()">Login</button>

    <div id="error" class="error"></div>

    <div class="footer">Academic Dashboard System</div>

</div>

<script>

function login(){
    let regno = document.getElementById("regno").value;

    if(regno === ""){
        document.getElementById("error").innerText = "Enter register number";
        return;
    }

    window.location.href = "dashboard.html?regno=" + regno;
}

</script>

</body>
</html>
