<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#eef1f6;
}

/* TOPBAR */
.topbar {
    height:60px;
    background:linear-gradient(90deg,#6a1b9a,#3949ab);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

/* MAIN */
.main {
    padding:30px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

/* COLORS */
.title {font-weight:bold;font-size:18px;margin-bottom:10px;}
.total {color:#1e88e5;}
.completed {color:#43a047;}
.remaining {color:#e53935;}

/* BAR */
.bar {
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-top:8px;
    overflow:hidden;
}

.fill {
    height:100%;
    background:linear-gradient(90deg,#4caf50,#81c784);
    border-radius:10px;
    width:0;
    transition:width 1s ease-in-out;
}

/* ❌ NO DATA BOX */
.no-data {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    font-size:18px;
    grid-column:1/-1;
}

/* ERROR */
.error {
    background:#ffebee;
    color:#c62828;
    padding:20px;
    border-radius:10px;
    text-align:center;
    grid-column:1/-1;
}
</style>

</head>

<body>

<div class="topbar">
    <h3>🎓 Student Dashboard</h3>
    <div id="reg"></div>
</div>

<div class="main">
    <div id="summary" class="grid"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const regno = params.get("regno");

document.getElementById("reg").innerText = regno;

// 🔥 FETCH DATA
fetch(`http://127.0.0.1:5000/dashboard/${regno}`)
.then(res => res.json())
.then(data => {

    let container = document.getElementById("summary");
    container.innerHTML = "";

    // ✅ HANDLE NO DATA
    if(data.message){
        container.innerHTML = `
            <div class="no-data">
                ❌ No data found for Register No: <b>${regno}</b>
            </div>
        `;
        return;
    }

    // ✅ NORMAL DATA
    data.forEach((c,index) => {

        let percent = Math.round((c.completed / c.total) * 100);

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="title">Category: ${c.category}</div>
            <div class="total">Total: ${c.total}</div>
            <div class="completed">Completed: ${c.completed}</div>
            <div class="remaining">Remaining: ${c.remaining}</div>
            <div>Progress: ${percent}%</div>

            <div class="bar">
                <div class="fill" id="bar${index}"></div>
            </div>
        `;

        container.appendChild(card);

        // 🔥 BAR ANIMATION
        setTimeout(() => {
            document.getElementById(`bar${index}`).style.width = percent + "%";
        }, 200);
    });

})
.catch(error => {
    document.getElementById("summary").innerHTML = `
        <div class="error">
            ⚠️ Server error. Please check backend.
        </div>
    `;
});

</script>

</body>
</html>
